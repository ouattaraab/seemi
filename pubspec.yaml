name: ppv_app
description: "SeeMi — Plateforme de monétisation de contenu visuel pour créateurs africains."
publish_to: 'none'
version: 1.4.6+20

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6  # HIGH-08 — certificate pinning SHA-256
  provider: ^6.1.5
  go_router: ^17.1.0
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  image_picker: ^1.1.2
  video_thumbnail: ^0.5.3
  paystack_flutter_sdk: ^0.0.1-alpha.2
  share_plus: ^10.1.4
  flutter_contacts: ^1.1.9
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  gal: ^2.3.0
  path_provider: ^2.1.5
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.2
  shared_preferences: ^2.3.2
  flutter_jailbreak_detection: ^1.10.0
  sentry_flutter: ^9.14.0  # SECU-11 — monitoring erreurs + crashes
  local_auth: ^2.3.0       # Authentification biométrique (empreinte / Face ID)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_core_platform_interface: ^6.0.2
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: ADLaM Display
      fonts:
        - asset: assets/fonts/ADLaMDisplay-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
